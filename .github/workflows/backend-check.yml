name: Backend Quality & Security Check

on:
  push:
    branches: ["**"]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-check.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend Quality & Security
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: presentation_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install flake8 bandit safety pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Linting (Flake8)
        run: |
          cd backend
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security Audit (Bandit)
        run: |
          cd backend
          bandit -r . -s B101,B105 --exclude ./venv

      - name: Dependency Scan (Safety)
        run: |
          cd backend
          # Check for known vulnerabilities in requirements
          # Ignoring 64459, 64396 (ecdsa side-channel/minerva) as they are common in Python-based crypto libs
          safety check --ignore 64459,64396

      - name: Verify Alembic Migrations
        env:
          DATABASE_URL: postgresql+psycopg2://admin:admin@localhost:5435/presentation_db
        run: |
          cd backend
          alembic upgrade head
          
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+psycopg2://admin:admin@localhost:5435/presentation_db
        run: |
          cd backend
          python -m pytest
